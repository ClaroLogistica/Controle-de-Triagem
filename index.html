
<!DOCTYPE html>
<html lang='pt-br'>
<head>
<meta charset='UTF-8'>
<title>Login - Claro Dashboard</title>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
<style>
body{
 background:#0a0f1f; color:white; height:100vh; display:flex; justify-content:center; align-items:center;
 font-family:'Segoe UI',sans-serif;
}
.login-box{
 background:#001526; padding:40px; border-radius:12px; width:380px;
 text-align:center; box-shadow:0 0 18px rgba(0,0,0,0.45);
}
.logo{
 width:120px; margin-bottom:20px;
}
input{
 width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px;
 background:#e5e5e5;
}
button{
 width:100%; padding:12px; background:#e50000; border:none; border-radius:8px;
 margin-top:20px; font-size:16px; color:white; cursor:pointer;
}
button:hover{ background:#ff1a1a; }
#erro{ color:#ff4d4d; display:none; margin-top:12px; }
</style>
</head>
<body>
<div class='login-box'>
<img src='https://upload.wikimedia.org/wikipedia/commons/0/0e/Claro_logo_2017.png' class='logo'>
<h3>Portal Claro Logística</h3>
<input type='text' id='login' placeholder='Usuário'>
<input type='password' id='senha' placeholder='Senha'>
<button onclick="autenticar()">Entrar</button>
<p id='erro'>Usuário ou senha incorretos.</p>
</div>
<script>
function autenticar(){
 const user=document.getElementById('login').value.trim();
 const pass=document.getElementById('senha').value.trim();
 if(user==='claro' && pass==='sucesso'){
   window.location.href='dashboard_pro_opcaoB.html';
 } else {
   document.getElementById('erro').style.display='block';
 }
}
</script>
</body>
</html>
