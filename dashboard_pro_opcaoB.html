
<!DOCTYPE html>
<html lang='pt-br'>
<head>
<meta charset='UTF-8'>
<title>Dashboard PRO - Tema Escuro</title>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
<link href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css' rel='stylesheet'>
<link href='https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css' rel='stylesheet'>
<script src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
<style>
body { background:#1a1d21; color:white; }
.sidebar { width:250px; height:100vh; position:fixed; background:#111; padding:20px; }
.sidebar a { display:block; padding:10px; color:#ccc; text-decoration:none; }
.main { margin-left:270px; padding:20px; }
.card { background:#2a2e33; border:none; color:white; }
.table { color:white; }
</style>
</head>
<body>
<div class='sidebar'>
<h3>📊 Dashboard</h3>
<a href='#kpis'>KPIs</a>
<a href='#graficos'>Gráficos</a>
<a href='#tabela'>Tabela</a>
<a href='#upload'>Upload Excel</a>
</div>
<div class='main'>
<h1>Dashboard de Produção - COMPLETO</h1>
<section id='upload' class='mt-4'>
<div class='card p-4'><h4>Upload Excel</h4><input type='file' id='inputExcel' class='form-control'></div>
</section>
<section id='kpis' class='mt-4'>
<div class='row'>
<div class='col-md-4'><div class='card p-3'><h4>Total Itens</h4><h2 id='kpiTotal'>0</h2></div></div>
<div class='col-md-4'><div class='card p-3'><h4>Modelos Únicos</h4><h2 id='kpiModelos'>0</h2></div></div>
<div class='col-md-4'><div class='card p-3'><h4>Laboratórios</h4><h2 id='kpiLabs'>0</h2></div></div>
</div>
</section>
<section id='graficos' class='mt-4'>
<div class='row'>
<div class='col-md-6'><div class='card p-3'><canvas id='chart1'></canvas></div></div>
<div class='col-md-6'><div class='card p-3'><canvas id='chart2'></canvas></div></div>
</div>
</section>
<section id='tabela' class='mt-4'>
<div class='card p-4'><table id='tableData' class='table table-dark table-striped'><thead id='thead'></thead><tbody id='tbody'></tbody></table></div>
</section>
</div>
<script src='https://code.jquery.com/jquery-3.7.0.js'></script>
<script src='https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js'></script>
<script src='https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js'></script>
<script>
let tabela;
let dados = [];

document.getElementById('inputExcel').addEventListener('change', function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, { type:'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);
        dados = json;
        montarKPIs();
        montarTabela();
        montarGraficos();
    };

    reader.readAsArrayBuffer(file);
});

function montarKPIs(){
    document.getElementById('kpiTotal').innerText = dados.length;
    document.getElementById('kpiModelos').innerText = new Set(dados.map(d=>d.Modelo)).size;
    document.getElementById('kpiLabs').innerText = new Set(dados.map(d=>d.Laboratório)).size;
}

function montarTabela(){
    const cols = Object.keys(dados[0]);
    document.getElementById('thead').innerHTML = '<tr>' + cols.map(c=>`<th>${c}</th>`).join('') + '</tr>';

    let tbody = '';
    dados.forEach(row=>{
        tbody += '<tr>' + cols.map(c=>`<td>${row[c]||''}</td>`).join('') + '</tr>';
    });
    document.getElementById('tbody').innerHTML = tbody;

    if(tabela) tabela.destroy();
    tabela = new DataTable('#tableData');
}

function montarGraficos(){
    const quantPorModelo = {};
    dados.forEach(d=>{ quantPorModelo[d.Modelo] = (quantPorModelo[d.Modelo]||0)+1; });

    new Chart(document.getElementById('chart1'),{
        type:'bar',
        data:{ labels:Object.keys(quantPorModelo), datasets:[{ label:'Qtd', data:Object.values(quantPorModelo), backgroundColor:'#0d6efd' }] }
    });

    const quantPorLab = {};
    dados.forEach(d=>{ quantPorLab[d.Laboratório] = (quantPorLab[d.Laboratório]||0)+1; });

    new Chart(document.getElementById('chart2'),{
        type:'pie',
        data:{ labels:Object.keys(quantPorLab), datasets:[{ data:Object.values(quantPorLab), backgroundColor:['#0d6efd','#dc3545','#ffc107','#198754'] }] }
    });
}
</script>
</body>
</html>
