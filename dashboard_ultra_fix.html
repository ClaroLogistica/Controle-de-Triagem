
<!DOCTYPE html>
<html lang='pt-br'>
<head>
<meta charset='UTF-8'>
<title>Dashboard Ultra FIX</title>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
<script src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
<style>
body{background:#111;color:#fff;font-family:Segoe UI;}
.card{background:#1d1f22;border:none;color:white;margin-top:20px;}
</style>
</head>
<body class='container'>
<h1 class='mt-4'>Dashboard Ultra FIX</h1>
<div class='card p-4'>
<h4>Upload Excel</h4>
<input type='file' id='inputExcel' class='form-control'>
</div>
<div class='row'>
<div class='col-md-4'><div class='card p-3'><h3>Total Itens</h3><h2 id='k1'>0</h2></div></div>
<div class='col-md-4'><div class='card p-3'><h3>Modelos Únicos</h3><h2 id='k2'>0</h2></div></div>
<div class='col-md-4'><div class='card p-3'><h3>Locais</h3><h2 id='k3'>0</h2></div></div>
</div>
<div class='row mt-4'>
<div class='col-md-6'><div class='card p-3'><canvas id='g1'></canvas></div></div>
<div class='col-md-6'><div class='card p-3'><canvas id='g2'></canvas></div></div>
</div>
<script>
function normalize(k){return k.toLowerCase().normalize('NFD').replace(/\p{Diacritic}/gu,'').replace(/\s+/g,'');}
let data=[];
document.getElementById('inputExcel').addEventListener('change',e=>{
 const file=e.target.files[0]; const r=new FileReader();
 r.onload=ev=>{
  const wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
  const sheet=wb.Sheets[wb.SheetNames[0]];
  const json=XLSX.utils.sheet_to_json(sheet);
  if(json.length==0){alert('Planilha vazia');return;}
  const cols=Object.keys(json[0]);
  let map={};
  cols.forEach(c=>{map[normalize(c)]=c});
  let colModelo=map['modelo'];
  let colLocal=map['local'];
  let colQtd=map['quantidade'];
  if(!colModelo||!colLocal||!colQtd){alert('Colunas necessárias não encontradas!');return;}
  data=json;
  document.getElementById('k1').innerText=data.reduce((a,b)=>a+(Number(b[colQtd])||0),0);
  document.getElementById('k2').innerText=new Set(data.map(d=>d[colModelo])).size;
  document.getElementById('k3').innerText=new Set(data.map(d=>d[colLocal])).size;
  let mCount={};
  data.forEach(d=>{let m=d[colModelo]; mCount[m]=(mCount[m]||0)+(Number(d[colQtd])||0);});
  new Chart(g1,{type:'bar',data:{labels:Object.keys(mCount),datasets:[{label:'Qtd',data:Object.values(mCount),backgroundColor:'#e50000'}]}});
  let lCount={};
  data.forEach(d=>{let m=d[colLocal]; lCount[m]=(lCount[m]||0)+(Number(d[colQtd])||0);});
  new Chart(g2,{type:'pie',data:{labels:Object.keys(lCount),datasets:[{data:Object.values(lCount),backgroundColor:['#e50000','#ff3333','#aa0000','#660000']}]}});
 };
 r.readAsArrayBuffer(file);
});
</script>
</body>
</html>
