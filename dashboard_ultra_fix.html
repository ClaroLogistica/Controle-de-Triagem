
<!DOCTYPE html><html lang='pt-br'><head><meta charset='UTF-8'><title>Dashboard ULTRA FIX</title>
<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
<script src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
<style>body{background:#111;color:#fff;font-family:Arial;} .card{background:#1d1f22;border:none;color:white;margin-top:20px;}</style>
</head><body class='container'>
<h1 class='mt-4'>Dashboard Ultra FIX</h1>
<div class='card p-3'><input type='file' id='excel' class='form-control'></div>
<div class='row'>
<div class='col'><div class='card p-3'><h3>Total</h3><h2 id='k1'>0</h2></div></div>
<div class='col'><div class='card p-3'><h3>Modelos</h3><h2 id='k2'>0</h2></div></div>
<div class='col'><div class='card p-3'><h3>Locais</h3><h2 id='k3'>0</h2></div></div>
</div>
<div class='row'>
<div class='col-md-6'><div class='card p-3'><canvas id='g1'></canvas></div></div>
<div class='col-md-6'><div class='card p-3'><canvas id='g2'></canvas></div></div>
</div>
<script>
function norm(t){return t.toLowerCase().normalize('NFD').replace(/\p{Diacritic}/gu,'').replace(/\s+/g,'');}
let data=[];
excel.onchange = e =>{
 let f=e.target.files[0]; let r=new FileReader();
 r.onload = ev =>{
  let wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
  let sh=wb.Sheets[wb.SheetNames[0]];
  let j=XLSX.utils.sheet_to_json(sh);
  if(!j.length){alert('vazio');return;}
  let cols=Object.keys(j[0]); let map={}; cols.forEach(c=>map[norm(c)]=c);
  let cM=map['modelo'], cL=map['local'], cQ=map['quantidade'];
  if(!cM||!cL||!cQ){alert('Colunas faltando');return;}
  data=j;
  k1.innerText=data.reduce((a,b)=>a+(Number(b[cQ])||0),0);
  k2.innerText=new Set(data.map(d=>d[cM])).size;
  k3.innerText=new Set(data.map(d=>d[cL])).size;
  let mc={}; data.forEach(d=>mc[d[cM]]=(mc[d[cM]]||0)+(Number(d[cQ])||0));
  new Chart(g1,{type:'bar',data:{labels:Object.keys(mc),datasets:[{label:'Qtd',data:Object.values(mc),backgroundColor:'#e50000'}]}});
  let lc={}; data.forEach(d=>lc[d[cL]]=(lc[d[cL]]||0)+(Number(d[cQ])||0));
  new Chart(g2,{type:'pie',data:{labels:Object.keys(lc),datasets:[{data:Object.values(lc),backgroundColor:['#e50000','#ff3333','#aa0000','#660000']}]}});
 }
 r.readAsArrayBuffer(f);
}
</script>
</body></html>
